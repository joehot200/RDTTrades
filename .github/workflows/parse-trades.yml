name: parse-trades

permissions:
  contents: write

on:
  push:
    branches: [main]
    paths:
      - "inbox/*.json"
      - ".github/scripts/parse-trades.mjs"
      - ".github/workflows/parse-trades.yml"
  workflow_dispatch: {}

concurrency:
  group: parse-trades-${{ github.ref }}
  cancel-in-progress: true

jobs:
  parse:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Parse inbox -> cleaned logs + completed trades
        run: node .github/scripts/parse-trades.mjs

      - name: Commit & push (if changed)
        run: |
          set -euo pipefail
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add -A trades
          if git diff --cached --quiet; then
            echo "No changes"
            exit 0
          fi

          git commit -m "build: parse inbox trades"
          git push origin HEAD:main
